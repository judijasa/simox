repos:
  # - repo: https://github.com/pre-commit/pre-commit-hooks
  # Discarded as it requires manually re-staging auto fixed files
  # Instead use editor configuration
    # rev: v6.0.0
    # hooks:
      # - id: trailing-whitespace
        # Handle horizontal triling whitespaces
        # files: \.(php|js|ts|css|html|md|json)$
      # - id: end-of-file-fixer
        # Handle EOF whitespace issues
        # files: \.(php|js|ts|css|html|md|json)$

  - repo: local
    hooks:
      # 1. Your Custom Shell Script
      - id: general-pre-commit
        name: My Custom Generic Format Pre-Commit Logic
        entry: ./hooks/custom-generic-format-pre-commit.sh
        language: script
        files: .* ```
      
      # 2. Your Standard Linter
      - id: phpstan
        name: phpstan
        entry: phpstan analyse
        language: system
        files: \.php$
