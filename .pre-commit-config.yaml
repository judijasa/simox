repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        # Targets only these extensions, ignoring files that require trailing spaces
        files: \.(php|js|ts|css|html|md|json)$

  - repo: local
    hooks:
      # 1. Your Custom Shell Script
      - id: general-pre-commit
        name: My Custom Generic Format Pre-Commit Logic
        entry: ./hooks/custom-generic-format-pre-commit.sh
        language: script
        files: .* ```
      
      # 2. Your Standard Linter
      - id: phpstan
        name: phpstan
        entry: phpstan analyse
        language: system
        files: \.php$
